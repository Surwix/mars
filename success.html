<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Mars! — MarsLand</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#d94f1e;--orange:#f07832;--glow:#ff7f40;--gold:#f5a623;--dark:#080401;--panel:#1c0e07;--border:#3a1a0a;--text:#f2e0d0;--muted:#8a6555;--dim:#4a2e1e;--green:#3ecf7a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow:hidden;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) infinite alternate;}
@keyframes tw{from{opacity:.05}to{opacity:.7}}
.box{position:relative;z-index:2;max-width:520px;width:100%;text-align:center;}
.icon{font-size:64px;margin-bottom:24px;animation:pop .5s cubic-bezier(.16,1,.3,1);}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.title{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:900;color:var(--green);margin-bottom:8px;line-height:1.1;}
.subtitle{font-size:16px;color:var(--muted);margin-bottom:32px;line-height:1.6;}
.citizen-card{background:var(--panel);border:1px solid var(--border);border-top:3px solid var(--green);padding:28px 24px;margin-bottom:24px;position:relative;}
.loading-text{color:var(--muted);font-size:14px;}
.citizen-num{font-family:'Orbitron',sans-serif;font-size:64px;font-weight:900;color:var(--glow);line-height:1;margin:8px 0;}
.citizen-label{font-size:11px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;}
.actions{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
.btn-main{background:var(--red);color:#fff;border:none;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;padding:15px 28px;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:background .2s;}
.btn-main:hover{background:var(--orange);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:13px;padding:13px 28px;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:all .3s;}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange);}
.share-row{margin-top:16px;font-size:12px;color:var(--dim);}
.share-row a{color:var(--orange);text-decoration:none;margin:0 8px;}
.confetti{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<canvas class="confetti" id="confetti"></canvas>

<div class="box">
  <div class="icon">🚀</div>
  <h1 class="title">You're on Mars!</h1>
  <p class="subtitle">Your registration is confirmed. Check your email for your official certificate.</p>

  <div class="citizen-card">
    <div class="citizen-label">Your Citizen Number</div>
    <div class="citizen-num" id="citizenNum">...</div>
    <div class="loading-text" id="loadingText">Loading your details...</div>
    <div id="citizenDetails" style="display:none;margin-top:16px;font-size:13px;color:var(--muted);line-height:2;">
      <div id="detailRegion"></div>
      <div id="detailSize"></div>
      <div style="margin-top:8px;font-size:10px;color:var(--dim);word-break:break-all;" id="detailHash"></div>
    </div>
  </div>

  <div class="actions">
    <a href="verify.html" class="btn-main">Verify My Certificate →</a>
    <a href="citizens.html" class="btn-ghost">View Citizens Registry</a>
    <a href="merch.html" class="btn-ghost">Order My Citizen T-Shirt</a>
    <a href="/" class="btn-ghost">Back to MarsLand</a>
  </div>

  <div class="share-row">
    Share your citizenship:
    <a href="https://twitter.com/intent/tweet?text=I%20just%20claimed%20my%20land%20on%20Mars%20🚀%20%23MarsLand%20marslandspace.com" target="_blank">X / Twitter</a>
    <a href="#" onclick="navigator.share&&navigator.share({title:'I own land on Mars!',url:'https://marslandspace.com'})">Share</a>
  </div>
</div>

<script>
const sf=document.getElementById('stars');
for(let i=0;i<100;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;sf.appendChild(s);}

// Confetti
const cc=document.getElementById('confetti');
const cctx=cc.getContext('2d');
cc.width=window.innerWidth;cc.height=window.innerHeight;
const pieces=Array.from({length:80},()=>({x:Math.random()*cc.width,y:-20,r:Math.random()*4+2,c:`hsl(${Math.random()*60+10},80%,60%)`,vx:(Math.random()-.5)*2,vy:Math.random()*3+2,rot:Math.random()*360,vr:(Math.random()-.5)*5}));
let animating=true;
function animConfetti(){if(!animating)return;cctx.clearRect(0,0,cc.width,cc.height);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.rot*Math.PI/180);cctx.fillStyle=p.c;cctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);cctx.restore();if(p.y>cc.height){p.y=-20;p.x=Math.random()*cc.width;}});requestAnimationFrame(animConfetti);}
animConfetti();
setTimeout(()=>animating=false,5000);

// Load session data
const params=new URLSearchParams(window.location.search);
const sessionId=params.get('session_id');
if(sessionId){
  // In production: fetch /api/session-details?id=sessionId
  // For now show generic success
  document.getElementById('citizenNum').textContent='#???';
  document.getElementById('loadingText').textContent='Check your email for your citizen number and certificate.';
} else {
  document.getElementById('citizenNum').textContent='✓';
  document.getElementById('loadingText').textContent='Registration confirmed. Certificate sent to your email.';
}
</script>
</body>
</html>
