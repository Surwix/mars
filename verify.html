<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verify Certificate — MarsLand</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#d94f1e;--orange:#f07832;--glow:#ff7f40;--gold:#f5a623;--dark:#080401;--panel:#1c0e07;--border:#3a1a0a;--text:#f2e0d0;--muted:#8a6555;--dim:#4a2e1e;--green:#3ecf7a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
nav{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:17px;color:var(--glow);text-decoration:none;}
.logo span{color:var(--muted);}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.verify-box{width:100%;max-width:560px;}
.tag{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--orange);margin-bottom:12px;}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:700;margin-bottom:24px;line-height:1.1;}
.search-row{display:flex;gap:0;margin-bottom:32px;}
.search-input{flex:1;background:var(--panel);border:1px solid var(--border);border-right:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px 16px;outline:none;-webkit-appearance:none;border-radius:0;}
.search-input:focus{border-color:var(--orange);}
.search-input::placeholder{color:var(--dim);}
.search-btn{background:var(--red);color:#fff;border:none;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;padding:14px 20px;cursor:pointer;transition:background .2s;white-space:nowrap;}
.search-btn:hover{background:var(--orange);}
.result{background:var(--panel);border:1px solid var(--border);padding:28px 24px;display:none;position:relative;overflow:hidden;}
.result::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold));}
.result.valid::before{background:linear-gradient(90deg,var(--green),#2ecc71);}
.result.invalid::before{background:var(--red);}
.status-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.status-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.status-icon.valid{background:rgba(62,207,122,.15);border:1px solid rgba(62,207,122,.4);}
.status-icon.invalid{background:rgba(217,79,30,.15);border:1px solid rgba(217,79,30,.4);}
.status-text{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;}
.status-text.valid{color:var(--green);}
.status-text.invalid{color:var(--red);}
.cert-details{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
.detail-field label{display:block;font-size:9px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}
.detail-field span{font-size:14px;color:var(--text);}
.hash-row{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.hash-label{font-size:9px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.hash-val{font-size:10px;color:var(--muted);font-family:'Orbitron',sans-serif;word-break:break-all;line-height:1.5;}
.back-link{text-align:center;margin-top:24px;font-size:12px;color:var(--muted);}
.back-link a{color:var(--orange);text-decoration:none;}
footer{padding:20px;text-align:center;font-size:10px;color:var(--dim);border-top:1px solid var(--border);}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">MARS<span>LAND</span></a>
  <a href="index.html" style="font-size:11px;color:var(--muted);text-decoration:none;">← Back to site</a>
</nav>
<div class="main">
  <div class="verify-box">
    <div class="tag">Certificate Verification</div>
    <h1>Verify Your<br>Mars Certificate</h1>
    <div class="search-row">
      <input type="text" class="search-input" id="verifyInput" placeholder="Enter citizen number (e.g. 007)" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <button class="search-btn" onclick="verifyCert()">Verify →</button>
    </div>
    <div class="result" id="result">
      <div class="status-row">
        <div class="status-icon" id="statusIcon"></div>
        <div class="status-text" id="statusText"></div>
      </div>
      <div class="cert-details">
        <div class="detail-field"><label>Citizen Number</label><span id="dNum">—</span></div>
        <div class="detail-field"><label>Registered Name</label><span id="dName">—</span></div>
        <div class="detail-field"><label>Territory</label><span id="dRegion">—</span></div>
        <div class="detail-field"><label>Parcel Size</label><span id="dSize">—</span></div>
        <div class="detail-field"><label>Coordinates</label><span id="dCoords">—</span></div>
        <div class="detail-field"><label>Issued</label><span id="dDate">—</span></div>
      </div>
      <div class="hash-row">
        <div class="hash-label">SHA-256 Authenticity Hash</div>
        <div class="hash-val" id="dHash">—</div>
      </div>
    </div>
    <div class="back-link"><a href="index.html">← Back to MarsLand</a> · <a href="citizens.html">View All Citizens</a></div>
  </div>
</div>
<footer>marslandspace.com · Certificate Verification System · All records are permanent and tamper-proof</footer>
<script>
// Mock database — replace with Supabase API call
const db={
  1:{name:'A. Chen',region:'Olympus Mons',size:'500 km²',coords:'18.6°N · 226.2°E',date:'2025-03-01',hash:'a3f8c2d1e9b7f4a2c8d3e1f9b6a7c2d4e8f1b3a9c5d7e2f4b8a1c6d3e9f2b5'},
  2:{name:'M. Rodriguez',region:'Valles Marineris',size:'100 km²',coords:'13.9°S · 59.2°W',date:'2025-03-02',hash:'b7c2d4e8f1a3c6d9e2f5b8a1c4d7e0f3b6a9c2d5e8f1b4a7c0d3e6f9b2a5c8'},
  3:{name:'J. Park',region:'Hellas Basin',size:'2,000 km²',coords:'42.4°S · 70.5°E',date:'2025-03-05',hash:'c1d4e7f0b3a6c9d2e5f8b1a4c7d0e3f6b9a2c5d8e1f4b7a0c3d6e9f2b5a8c1'},
  4:{name:'S. Williams',region:'Tharsis Plateau',size:'500 km²',coords:'8.5°N · 101.8°W',date:'2025-03-10',hash:'d5e8f1b4a7c0d3e6f9b2a5c8d1e4f7b0a3c6d9e2f5b8a1c4d7e0f3b6a9c2d5'},
  5:{name:'K. Müller',region:'Arcadia Planitia',size:'100 km²',coords:'46.7°N · 184.2°W',date:'2025-03-14',hash:'e2f5b8a1c4d7e0f3b6a9c2d5e8f1b4a7c0d3e6f9b2a5c8d1e4f7b0a3c6d9e2'},
};
function verifyCert(){
  const val=parseInt(document.getElementById('verifyInput').value);
  const res=document.getElementById('result');
  res.style.display='block';
  if(db[val]){
    const c=db[val];
    res.className='result valid';
    document.getElementById('statusIcon').innerHTML='✓';document.getElementById('statusIcon').className='status-icon valid';
    document.getElementById('statusText').textContent='CERTIFICATE VERIFIED';document.getElementById('statusText').className='status-text valid';
    document.getElementById('dNum').textContent='#'+String(val).padStart(3,'0');
    document.getElementById('dName').textContent=c.name;document.getElementById('dRegion').textContent=c.region;
    document.getElementById('dSize').textContent=c.size;document.getElementById('dCoords').textContent=c.coords;
    document.getElementById('dDate').textContent=c.date;document.getElementById('dHash').textContent=c.hash;
  } else {
    res.className='result invalid';
    document.getElementById('statusIcon').innerHTML='✗';document.getElementById('statusIcon').className='status-icon invalid';
    document.getElementById('statusText').textContent='NOT FOUND';document.getElementById('statusText').className='status-text invalid';
    ['dNum','dName','dRegion','dSize','dCoords','dDate','dHash'].forEach(id=>document.getElementById(id).textContent='—');
  }
  res.scrollIntoView({behavior:'smooth',block:'nearest'});
}
document.getElementById('verifyInput').addEventListener('keydown',e=>{if(e.key==='Enter')verifyCert();});
</script>
</body>
</html>
